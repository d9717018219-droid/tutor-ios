workflows:
  ios-production:
    name: DoAble India iOS Production
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.doableindia
      vars:
        BUNDLE_ID: com.doableindia
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: ZWZHGD737F
        issuer_id: 908dcf6c-cf7c-4ba7-afa2-5eac59dfef37
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/DoAbleIndia.xcworkspace \
            --scheme DoAbleIndia
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        submit_to_testflight: true
