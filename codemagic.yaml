workflows:
  ios-production:
    name: DoAble India iOS Production
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.doableindia
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: ZWZHGD737F
        APP_STORE_CONNECT_ISSUER_ID: 908dcf6c-cf7c-4ba7-afa2-5eac59dfef37
        NODE_OPTIONS: "--max-old-space-size=4096"
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild iOS
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install dependencies after prebuild
        script: npm install --legacy-peer-deps
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(find ios -maxdepth 1 -name "*.xcodeproj" | head -1 | xargs basename | sed 's/.xcodeproj//')
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

          cat > /tmp/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>5WW267C2PX</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --export-options-plist /tmp/export_options.plist \
            --archive-xcargs "CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=5WW267C2PX"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
