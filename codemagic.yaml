workflows:
  ios-production:
    name: DoAble India iOS Production
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.doableindia
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: ZWZHGD737F
        APP_STORE_CONNECT_ISSUER_ID: 908dcf6c-cf7c-4ba7-afa2-5eac59dfef37
        NODE_OPTIONS: "--max-old-space-size=4096"
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild iOS (no install)
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install dependencies after prebuild
        script: npm install --legacy-peer-deps
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/DoAbleIndia.xcworkspace \
            --scheme DoAbleIndia
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
